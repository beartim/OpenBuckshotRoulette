name: Build iOS unsigned IPA

on:
  workflow_dispatch:
    inputs:
      bundle_id:
        description: Bundle identifier used for the unsigned build
        required: true
        default: com.example.openbuckshotroulette
      ios_deployment_target:
        description: Minimum iOS version (Godot 4.7 supports 14.0 or later)
        required: true
        default: "14.0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GODOT_VERSION: 4.7-stable

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 75
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          lfs: true
          persist-credentials: false

      - name: Select Xcode 15
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d /Applications/Xcode_15.4.app ]]; then
            XCODE_APP=/Applications/Xcode_15.4.app
          else
            XCODE_APP="$(find /Applications -maxdepth 1 -type d -name 'Xcode_15*.app' -print | sort | tail -n 1)"
          fi
          if [[ -z "${XCODE_APP:-}" ]]; then
            echo "::error::No Xcode 15 installation is available on this runner."
            find /Applications -maxdepth 1 -name 'Xcode*.app' -print || true
            exit 1
          fi
          sudo xcode-select --switch "$XCODE_APP/Contents/Developer"
          xcodebuild -version
          echo "Xcode developer directory: $(xcode-select -p)"
          echo "iPhoneOS SDK: $(xcrun --sdk iphoneos --show-sdk-version)"

      - name: Verify repository layout
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for file in \
            project.godot \
            scripts/ModLoader.gd \
            ios_port/apply_ios_port.py \
            ios_port/build_ios.sh \
            ios_port/export_presets.cfg.template; do
            if [[ ! -f "$file" ]]; then
              echo "::error file=$file::Required file is missing. Copy the iOS kit into a full OpenBuckshotRoulette fork."
              missing=1
            fi
          done
          (( missing == 0 )) || exit 1
          chmod +x ios_port/build_ios.sh ios_port/apply_ios_port.py

      - name: Download Godot 4.7 and export templates
        shell: bash
        run: |
          set -euo pipefail
          GODOT_ZIP="Godot_v${GODOT_VERSION}_macos.universal.zip"
          TEMPLATE_TPZ="Godot_v${GODOT_VERSION}_export_templates.tpz"
          RELEASE_BASE="https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}"

          curl --fail --location --retry 5 --retry-all-errors \
            --output godot.zip "${RELEASE_BASE}/${GODOT_ZIP}"
          unzip -q godot.zip

          curl --fail --location --retry 5 --retry-all-errors \
            --output templates.tpz "${RELEASE_BASE}/${TEMPLATE_TPZ}"
          rm -rf template_unpack
          mkdir -p template_unpack
          unzip -q templates.tpz -d template_unpack

          TEMPLATE_DIR="$HOME/Library/Application Support/Godot/export_templates/4.7.stable"
          mkdir -p "$TEMPLATE_DIR"
          cp -R template_unpack/templates/. "$TEMPLATE_DIR/"

          chmod +x Godot.app/Contents/MacOS/Godot
          Godot.app/Contents/MacOS/Godot --version
          test -f "$TEMPLATE_DIR/ios.zip"

      - name: Build unsigned IPA
        shell: bash
        env:
          GODOT_BIN: ${{ github.workspace }}/Godot.app/Contents/MacOS/Godot
          BUNDLE_ID: ${{ inputs.bundle_id }}
          IOS_DEPLOYMENT_TARGET: ${{ inputs.ios_deployment_target }}
          UNSIGNED: "1"
          UNSIGNED_PROJECT_TEAM_ID: ABCDE12XYZ
          ALLOW_INSECURE_WS: "1"
        run: ./ios_port/build_ios.sh

      - name: Upload unsigned IPA
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: OpenBuckshotRoulette-iOS-unsigned
          path: build/ipa/*.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: OpenBuckshotRoulette-iOS-build-logs
          path: build/logs/
          if-no-files-found: ignore
          retention-days: 14
