name: Build OpenBuckshotRoulette iOS 14 IPA

on:
  workflow_dispatch:
    inputs:
      bundle_id:
        description: Bundle identifier for the unsigned build
        required: true
        default: com.example.openbuckshotroulette

permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GODOT_VERSION: 4.7-stable
  IOS_DEPLOYMENT_TARGET: "14.0"
  XCODE_VERSION: "16.4"
  TEMPLATE_REPOSITORY: beartim/Godot_4.7_iOS14
  TEMPLATE_RUN_ID: "29162215438"
  TEMPLATE_ARTIFACT_ID: "8251361551"

jobs:
  build-ios14:
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - name: Checkout OpenBuckshotRoulette
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          lfs: true
          persist-credentials: false

      - name: Select Xcode 16.4
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/logs
          find /Applications -maxdepth 1 -type d -name 'Xcode*.app' -print \
            | sort > build/logs/available-xcodes.txt

          XCODE_APP="/Applications/Xcode_${XCODE_VERSION}.app"
          if [[ ! -d "$XCODE_APP" ]]; then
            XCODE_APP="$(find /Applications -maxdepth 1 -type d \
              \( -name 'Xcode_16.4.app' -o -name 'Xcode_16.4.0.app' \) \
              -print -quit)"
          fi

          if [[ -z "${XCODE_APP:-}" || ! -d "$XCODE_APP" ]]; then
            echo "::error::Xcode 16.4 is not installed on this runner."
            cat build/logs/available-xcodes.txt || true
            exit 1
          fi

          sudo xcode-select --switch "$XCODE_APP/Contents/Developer"

          XCODE_OUTPUT="$(xcodebuild -version 2>&1)"
          printf '%s\n' "$XCODE_OUTPUT" | tee build/logs/xcode-version.txt
          ACTUAL_VERSION="$(sed -nE \
            's/^Xcode[[:space:]]+([^[:space:]]+).*/\1/p' \
            <<< "$XCODE_OUTPUT")"

          if [[ "$ACTUAL_VERSION" != 16.4* ]]; then
            echo "::error::Expected Xcode 16.4, got ${ACTUAL_VERSION:-unknown}."
            exit 1
          fi

          {
            printf '%s\n' "$XCODE_OUTPUT"
            xcrun clang --version
            echo "Xcode app: $XCODE_APP"
            echo "Developer directory: $(xcode-select -p)"
            echo "iPhoneOS SDK: $(xcrun --sdk iphoneos --show-sdk-version)"
            echo "iPhoneOS SDK path: $(xcrun --sdk iphoneos --show-sdk-path)"
          } | tee build/logs/xcode-environment.txt

      - name: Verify repository layout
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for file in \
            project.godot \
            scripts/ModLoader.gd \
            ios_port/apply_ios_port.py \
            ios_port/build_ios14.sh \
            ios_port/export_presets.ios14.cfg.template; do
            if [[ ! -f "$file" ]]; then
              echo "::error file=$file::Required iOS 14 build file is missing."
              missing=1
            fi
          done
          (( missing == 0 )) || exit 1
          chmod +x ios_port/apply_ios_port.py ios_port/build_ios14.sh

      - name: Verify cross-repository artifact token
        shell: bash
        env:
          GODOT_ARTIFACT_TOKEN: ${{ secrets.GODOT_ARTIFACT_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p build/logs
          if [[ -z "${GODOT_ARTIFACT_TOKEN:-}" ]]; then
            echo "::error::Repository secret GODOT_ARTIFACT_TOKEN is missing. Create a fine-grained PAT with Actions: Read permission for beartim/Godot_4.7_iOS14, then save it as an Actions repository secret in OpenBuckshotRoulette."
            exit 1
          fi

          curl --fail --silent --show-error --location \
            --retry 4 --retry-all-errors \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GODOT_ARTIFACT_TOKEN}" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/${TEMPLATE_REPOSITORY}/actions/artifacts/${TEMPLATE_ARTIFACT_ID}" \
            --output build/logs/template-artifact-metadata.json

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          metadata_path = Path("build/logs/template-artifact-metadata.json")
          metadata = json.loads(metadata_path.read_text(encoding="utf-8"))

          expected_artifact_id = int(os.environ["TEMPLATE_ARTIFACT_ID"])
          expected_run_id = int(os.environ["TEMPLATE_RUN_ID"])
          actual_artifact_id = int(metadata.get("id", -1))
          actual_run_id = int((metadata.get("workflow_run") or {}).get("id", -1))

          if actual_artifact_id != expected_artifact_id:
              raise SystemExit(
                  f"error: expected artifact ID {expected_artifact_id}, got {actual_artifact_id}"
              )
          if actual_run_id != expected_run_id:
              raise SystemExit(
                  f"error: artifact belongs to run {actual_run_id}, expected {expected_run_id}"
              )
          if metadata.get("expired", True):
              raise SystemExit("error: the fixed Godot template artifact has expired")

          print(
              "Using Godot template artifact: "
              f"name={metadata.get('name')!r}, id={actual_artifact_id}, "
              f"run={actual_run_id}, size={metadata.get('size_in_bytes')} bytes"
          )
          PY

      - name: Download fixed Godot iOS 14 template artifact
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ env.TEMPLATE_ARTIFACT_ID }}
          path: custom-template-artifact
          github-token: ${{ secrets.GODOT_ARTIFACT_TOKEN }}
          repository: ${{ env.TEMPLATE_REPOSITORY }}
          run-id: ${{ env.TEMPLATE_RUN_ID }}

      - name: Prepare and verify custom template
        shell: bash
        run: |
          set -euo pipefail
          echo "Template source: https://github.com/${TEMPLATE_REPOSITORY}/actions/runs/${TEMPLATE_RUN_ID}/artifacts/${TEMPLATE_ARTIFACT_ID}" \
            | tee build/logs/template-artifact-source.txt
          find custom-template-artifact -maxdepth 4 -type f -print \
            | sort | tee build/logs/custom-template-artifact-files.txt

          TEMPLATE_ZIP="$(find custom-template-artifact -type f \
            -name 'godot-4.7-ios14-xcode16.4.zip' -print -quit)"
          if [[ -z "$TEMPLATE_ZIP" ]]; then
            TEMPLATE_ZIP="$(find custom-template-artifact -type f \
              -name '*ios14*xcode16.4*.zip' -print -quit)"
          fi
          if [[ -z "$TEMPLATE_ZIP" ]]; then
            echo "::error::The downloaded artifact does not contain the custom iOS 14 template ZIP."
            exit 1
          fi

          mkdir -p ios_port/custom_template
          cp "$TEMPLATE_ZIP" ios_port/custom_template/godot-ios14.zip
          unzip -t ios_port/custom_template/godot-ios14.zip \
            | tee build/logs/custom-template-integrity.txt
          unzip -l ios_port/custom_template/godot-ios14.zip \
            > build/logs/custom-template-contents.txt
          shasum -a 256 ios_port/custom_template/godot-ios14.zip \
            | tee build/logs/custom-template.sha256

          REPORT="$(find custom-template-artifact -type f \
            -name 'template-build-versions.txt' -print -quit)"
          if [[ -n "$REPORT" ]]; then
            cp "$REPORT" build/logs/template-build-versions.txt
            if ! grep -Eq 'minos[[:space:]]+14\.0|version[[:space:]]+14\.0' "$REPORT"; then
              echo "::error::The template report does not confirm an iOS 14.0 minimum."
              exit 1
            fi
          else
            echo "::warning::template-build-versions.txt is absent; final app Mach-O validation will still run."
          fi

          test -s ios_port/custom_template/godot-ios14.zip

      - name: Download Godot 4.7 editor
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_BASE="https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}"
          GODOT_ZIP="Godot_v${GODOT_VERSION}_macos.universal.zip"

          curl --fail --location --retry 5 --retry-all-errors \
            --output godot-editor.zip "${RELEASE_BASE}/${GODOT_ZIP}"
          unzip -q godot-editor.zip
          chmod +x Godot.app/Contents/MacOS/Godot
          Godot.app/Contents/MacOS/Godot --version \
            | tee build/logs/godot-editor-version.txt

      - name: Build unsigned iOS 14 IPA
        shell: bash
        env:
          GODOT_BIN: ${{ github.workspace }}/Godot.app/Contents/MacOS/Godot
          BUNDLE_ID: ${{ inputs.bundle_id }}
          IOS_DEPLOYMENT_TARGET: "14.0"
          IOS_CUSTOM_TEMPLATE: res://ios_port/custom_template/godot-ios14.zip
          UNSIGNED: "1"
          UNSIGNED_PROJECT_TEAM_ID: ABCDE12XYZ
          ALLOW_INSECURE_WS: "1"
        run: ./ios_port/build_ios14.sh

      - name: Upload unsigned iOS 14 IPA
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: OpenBuckshotRoulette-iOS14-unsigned
          path: build/ipa/*.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: OpenBuckshotRoulette-iOS14-build-logs
          path: build/logs/
          if-no-files-found: ignore
          retention-days: 30
