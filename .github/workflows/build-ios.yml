name: Build OpenBuckshotRoulette iOS 14 IPA (Vulkan/MoltenVK)

on:
  workflow_dispatch:
    inputs:
      bundle_id:
        description: Bundle identifier
        required: true
        default: com.wzn.openbuckshotroulette
      renderer:
        description: Vulkan is recommended for iOS 14; OpenGL is the safe fallback
        required: true
        type: choice
        default: vulkan
        options:
          - vulkan
          - opengl3
          - metal

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GODOT_VERSION: 4.7-stable
  XCODE_VERSION: "16.4"
  LOCAL_TEMPLATE_ZIP: godot-4.7-ios14-xcode16.4-template/godot-4.7-ios14-xcode16.4.zip
  MOLTENVK_VERSION: "1.3.0"
  IOS_BUILD_SCRIPT_REVISION: "2026-07-12-vulkan-moltenvk-runtime-v1"

jobs:
  build-ios14:
    runs-on: macos-15
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      - name: Checkout source and LFS files
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          lfs: true
          persist-credentials: false

      - name: Materialize custom iOS 14 template
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/logs
          git lfs install --local
          git lfs pull
          git lfs checkout
          test -s "$LOCAL_TEMPLATE_ZIP"
          if grep -q '^version https://git-lfs.github.com/spec/v1' "$LOCAL_TEMPLATE_ZIP"; then
            echo "::error::The custom template is still a Git LFS pointer."
            exit 1
          fi
          unzip -t "$LOCAL_TEMPLATE_ZIP" > build/logs/template-integrity.txt

      - name: Select Xcode 16.4
        shell: bash
        run: |
          set -euo pipefail
          sudo xcode-select --switch "/Applications/Xcode_${XCODE_VERSION}.app/Contents/Developer"
          XCODE_OUTPUT="$(xcodebuild -version 2>&1)"
          printf '%s\n' "$XCODE_OUTPUT" | tee build/logs/xcode-version.txt
          grep -Fq "Xcode ${XCODE_VERSION}" <<< "$XCODE_OUTPUT"
          xcrun --sdk iphoneos --show-sdk-version | tee build/logs/iphoneos-sdk.txt

      - name: Verify build scripts
        shell: bash
        run: |
          set -euo pipefail
          for file in \
            project.godot \
            scripts/ModLoader.gd \
            ios_port/apply_ios_port.py \
            ios_port/prepare_ios14_runtime.py \
            ios_port/build_ios14.sh \
            ios_port/export_presets.ios14.cfg.template; do
            test -f "$file" || { echo "::error file=$file::Required file missing"; exit 1; }
          done
          chmod +x ios_port/*.py ios_port/build_ios14.sh
          grep -Fq "$IOS_BUILD_SCRIPT_REVISION" ios_port/build_ios14.sh || {
            echo "::error::Old build_ios14.sh is still installed. Expected $IOS_BUILD_SCRIPT_REVISION"
            exit 1
          }
          grep -Fq 'choices=("vulkan", "metal", "opengl3")' ios_port/prepare_ios14_runtime.py || {
            echo "::error::prepare_ios14_runtime.py does not include Vulkan mode."
            exit 1
          }

      - name: Download static MoltenVK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/logs ios_port/deps /tmp/moltenvk-package
          URL="https://github.com/KhronosGroup/MoltenVK/releases/download/v${MOLTENVK_VERSION}/MoltenVK-all.tar"
          curl --fail --location --retry 5 --retry-all-errors \
            --output /tmp/MoltenVK-all.tar "$URL"
          shasum -a 256 /tmp/MoltenVK-all.tar | tee build/logs/moltenvk-download.sha256
          tar -xf /tmp/MoltenVK-all.tar -C /tmp/moltenvk-package
          MOLTENVK_SOURCE="$(python3 - <<'PY'
          from pathlib import Path
          valid = [
              p for p in Path('/tmp/moltenvk-package').rglob('MoltenVK.xcframework')
              if (p / 'Info.plist').is_file()
              and (p / 'ios-arm64' / 'libMoltenVK.a').is_file()
          ]
          print(valid[0] if valid else '')
          PY
          )"
          test -n "$MOLTENVK_SOURCE"
          rm -rf ios_port/deps/MoltenVK.xcframework
          ditto "$MOLTENVK_SOURCE" ios_port/deps/MoltenVK.xcframework
          test -s ios_port/deps/MoltenVK.xcframework/ios-arm64/libMoltenVK.a
          plutil -lint ios_port/deps/MoltenVK.xcframework/Info.plist \
            | tee build/logs/moltenvk-info-plist-lint.txt

      - name: Download Godot 4.7 editor
        shell: bash
        run: |
          set -euo pipefail
          BASE="https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}"
          curl -fL --retry 5 --retry-all-errors \
            -o godot-editor.zip \
            "$BASE/Godot_v${GODOT_VERSION}_macos.universal.zip"
          unzip -q godot-editor.zip
          chmod +x Godot.app/Contents/MacOS/Godot
          Godot.app/Contents/MacOS/Godot --version | tee build/logs/godot-version.txt

      - name: Build iOS 14 IPA
        shell: bash
        env:
          GODOT_BIN: ${{ github.workspace }}/Godot.app/Contents/MacOS/Godot
          BUNDLE_ID: ${{ inputs.bundle_id }}
          IOS_DEPLOYMENT_TARGET: "14.0"
          IOS_RENDERER: ${{ inputs.renderer }}
          IOS_CUSTOM_TEMPLATE: res://godot-4.7-ios14-xcode16.4-template/godot-4.7-ios14-xcode16.4.zip
          UNSIGNED: "1"
          UNSIGNED_PROJECT_TEAM_ID: ABCDE12XYZ
          ALLOW_INSECURE_WS: "1"
          MOLTENVK_XCFRAMEWORK: ${{ github.workspace }}/ios_port/deps/MoltenVK.xcframework
        run: ./ios_port/build_ios14.sh

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: OpenBuckshotRoulette-iOS14-${{ inputs.renderer }}-unsigned
          path: build/ipa/*.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Upload symbols
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: OpenBuckshotRoulette-iOS14-${{ inputs.renderer }}-symbols
          path: build/symbols/
          if-no-files-found: warn
          retention-days: 90

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: OpenBuckshotRoulette-iOS14-${{ inputs.renderer }}-build-logs
          path: build/logs/
          if-no-files-found: ignore
          retention-days: 30
